# ============================================================================
# VoxelChain Network Configuration
# ============================================================================
# Voxel On-Chain Game EVM Network
# A 3D voxel game world powered by EVM-compatible blockchain.
#
# This file defines ALL customizable parameters for the network.
# Edit these values, then run:
#   python3 scripts/configure-network.py
# to apply changes to all source files.
#
# To mine a new genesis block:
#   python3 scripts/mine-genesis.py
# ============================================================================

# ----------------------------------------------------------------------------
# Network Identity
# ----------------------------------------------------------------------------

# Display name of the network
NETWORK_NAME=VoxelChain

# Short lowercase identifier
NETWORK_ID=voxelchain

# Domain name for the network
DOMAIN=voxelchain.io

# Currency symbol displayed in MetaMask and explorer
CURRENCY_SYMBOL=VXL

# Number of decimal places for the native token
# 18 = wei precision (Ethereum standard) for smart contract compatibility
CURRENCY_DECIMALS=18

# ----------------------------------------------------------------------------
# Genesis Block
# ----------------------------------------------------------------------------

# Message embedded in the genesis block's coinbase transaction
GENESIS_MESSAGE=VoxelChain 17/Mar/2026 Building infinite worlds on-chain

# Genesis block timestamp (Unix epoch seconds)
GENESIS_TIME=1742169600

# Genesis block reward in coins
GENESIS_REWARD=100

# Genesis block version
GENESIS_VERSION=1

# ----------------------------------------------------------------------------
# Chain IDs (EVM-compatible, for MetaMask)
# ----------------------------------------------------------------------------
# Unique across all EVM chains. Check https://chainlist.org

CHAIN_ID_MAINNET=784200
CHAIN_ID_TESTNET=784201
CHAIN_ID_REGTEST=784202

# ----------------------------------------------------------------------------
# Network Ports
# ----------------------------------------------------------------------------

# P2P ports (node-to-node communication)
PORT_MAINNET=30303
PORT_TESTNET=30304
PORT_REGTEST=30305

# RPC port (node JSON-RPC, internal)
PORT_RPC=8545

# Bridge port (Ethereum JSON-RPC, for MetaMask)
PORT_BRIDGE=8546

# Game server port (voxel world sync)
PORT_GAME=25565

# WebSocket port (real-time events)
PORT_WS=8547

# ----------------------------------------------------------------------------
# Proof of Work Configuration
# ----------------------------------------------------------------------------

# Target block time in seconds
# 5 seconds for fast game interactions
POW_TARGET_SPACING=5

# Difficulty retarget interval in seconds
POW_TARGET_TIMESPAN_TESTNET=300
POW_TARGET_TIMESPAN_MAINNET=3600

# Allow minimum difficulty blocks on testnet
POW_ALLOW_MIN_DIFFICULTY_TESTNET=true

# Subsidy halving interval (number of blocks)
SUBSIDY_HALVING_INTERVAL=2100000

# Minimum mining transaction fee
MIN_MINING_TX_FEE=0.000000001

# ----------------------------------------------------------------------------
# Consensus Activation Heights
# ----------------------------------------------------------------------------

GENESIS_ACTIVATION_MAIN=0
GENESIS_ACTIVATION_TESTNET=0
GENESIS_ACTIVATION_REGTEST=0

# ----------------------------------------------------------------------------
# DNS Seeds (for peer discovery)
# ----------------------------------------------------------------------------

SEEDS_MAINNET=seed.voxelchain.io,seed2.voxelchain.io
SEEDS_TESTNET=testnet-seed.voxelchain.io

# ----------------------------------------------------------------------------
# Node Binary Names
# ----------------------------------------------------------------------------

DAEMON_NAME=voxelchaind
CLI_NAME=voxelchain-cli

# ----------------------------------------------------------------------------
# Gas/Fee Configuration (EVM compatibility)
# ----------------------------------------------------------------------------

# Default gas price (in wei)
DEFAULT_GAS_PRICE=1000000000

# Default gas limit for simple transfers
DEFAULT_GAS_LIMIT=21000

# Block gas limit
BLOCK_GAS_LIMIT=30000000

# Gas cost for voxel operations
GAS_PLACE_BLOCK=50000
GAS_BREAK_BLOCK=30000
GAS_TRANSFER_ITEM=40000
GAS_CLAIM_LAND=100000

# ----------------------------------------------------------------------------
# Explorer Configuration
# ----------------------------------------------------------------------------

EXPLORER_TITLE=VoxelChain Explorer
FAUCET_AMOUNT=100
FAUCET_COOLDOWN=3600

# ----------------------------------------------------------------------------
# Voxel World Configuration
# ----------------------------------------------------------------------------

# Chunk size (in blocks per axis)
CHUNK_SIZE=16

# World height (in chunks)
WORLD_HEIGHT=16

# Maximum world radius (in chunks from origin)
WORLD_RADIUS=1000

# Block types count (max unique voxel types)
MAX_BLOCK_TYPES=4096

# Land plot size (in chunks)
LAND_PLOT_SIZE=4

# Maximum blocks per transaction
MAX_BLOCKS_PER_TX=64

# Voxel data storage
VOXEL_STORAGE_MODE=hybrid
# hybrid = on-chain hash + off-chain data (IPFS)
# full = all data on-chain (expensive, small worlds only)
